<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive SHM Energy Animation</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #0b0f19;
        color: #ffffff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      h2 {
        margin-bottom: 20px;
        font-weight: 400;
        letter-spacing: 1px;
        text-align: center;
      }

      .simulation-container {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 30px;
        width: 90%;
        max-width: 600px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }

      /* Controls Area */
      .controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }

      button {
        background: #1f2937;
        color: white;
        border: 1px solid #374151;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      button:hover {
        background: #374151;
        border-color: #4b5563;
      }

      button#playPauseBtn.playing {
        background: #d97706; /* Orange for Pause */
        border-color: #f59e0b;
      }

      /* Motion Area */
      .motion-area {
        position: relative;
        width: 100%;
        height: 120px;
        border-bottom: 2px solid #4b5563;
        margin-bottom: 40px;
        display: flex;
        align-items: flex-end;
      }

      .wall {
        width: 10px;
        height: 80px;
        background: #374151;
        border-right: 2px solid #4b5563;
      }

      .spring {
        height: 10px;
        width: 150px; /* Default/Center width */
        border-top: 4px dashed #9ca3af;
        border-bottom: 4px dashed #9ca3af;
        align-self: center;
        margin-bottom: -35px;
      }

      .block {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        border-radius: 6px;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        transform: translateX(0px); /* Default center */
      }

      /* Axis Labels */
      .axis-label {
        position: absolute;
        bottom: -25px;
        font-size: 12px;
        color: #9ca3af;
      }
      .label-left {
        left: 95px;
      }
      .label-center {
        left: calc(50% + 5px);
        transform: translateX(-50%);
      }
      .label-right {
        right: 45px;
      }

      /* Energy Dashboard */
      .energy-dashboard {
        display: flex;
        justify-content: space-around;
        margin-top: 20px;
      }

      .energy-bar-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 45%;
      }

      .bar-outer {
        width: 35px;
        height: 150px;
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .bar-inner {
        position: absolute;
        bottom: 0;
        width: 100%;
        border-radius: 20px;
        height: 50px; /* Default starting height */
      }

      .ke-inner {
        background: linear-gradient(to top, #059669, #10b981);
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
      }

      .pe-inner {
        background: linear-gradient(to top, #dc2626, #ef4444);
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
      }

      .bar-title {
        font-size: 14px;
        font-weight: 500;
      }
      .ke-title {
        color: #10b981;
      }
      .pe-title {
        color: #ef4444;
      }

      /* --- ANIMATION CLASSES (Controlled by JS) --- */
      .animate-block {
        animation: oscillate 3s infinite ease-in-out;
      }
      .animate-spring {
        animation: stretch 3s infinite ease-in-out;
      }
      .animate-ke {
        animation: ke-change 3s infinite ease-in-out;
      }
      .animate-pe {
        animation: pe-change 3s infinite ease-in-out;
      }

      .paused {
        animation-play-state: paused !important;
      }

      @keyframes oscillate {
        0%,
        100% {
          transform: translateX(100px);
        }
        50% {
          transform: translateX(-100px);
        }
      }

      @keyframes stretch {
        0%,
        100% {
          width: 250px;
        }
        50% {
          width: 50px;
        }
      }

      @keyframes ke-change {
        0%,
        100% {
          height: 5%;
        }
        25%,
        75% {
          height: 100%;
        }
        50% {
          height: 5%;
        }
      }

      @keyframes pe-change {
        0%,
        100% {
          height: 95%;
        }
        25%,
        75% {
          height: 0%;
        }
        50% {
          height: 95%;
        }
      }
    </style>
  </head>
  <body>
    <h2>Interactive SHM Energy Visualization</h2>

    <div class="simulation-container">
      <div class="controls">
        <button id="playPauseBtn">Start</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="motion-area">
        <div class="wall"></div>
        <div class="spring" id="spring"></div>
        <div class="block" id="block"></div>

        <div class="axis-label label-left">-A</div>
        <div class="axis-label label-center">Equilibrium (x=0)</div>
        <div class="axis-label label-right">+A</div>
      </div>

      <div class="energy-dashboard">
        <div class="energy-bar-container">
          <div class="bar-outer">
            <div class="bar-inner ke-inner" id="keBar"></div>
          </div>
          <div class="bar-title ke-title">Kinetic Energy (E<sub>k</sub>)</div>
        </div>

        <div class="energy-bar-container">
          <div class="bar-outer">
            <div class="bar-inner pe-inner" id="peBar"></div>
          </div>
          <div class="bar-title pe-title">Potential Energy (E<sub>p</sub>)</div>
        </div>
      </div>
    </div>

    <script>
      const playPauseBtn = document.getElementById("playPauseBtn");
      const resetBtn = document.getElementById("resetBtn");

      const block = document.getElementById("block");
      const spring = document.getElementById("spring");
      const keBar = document.getElementById("keBar");
      const peBar = document.getElementById("peBar");

      let isPlaying = false;
      let isStarted = false;

      // Play / Pause Functionality
      playPauseBtn.addEventListener("click", () => {
        if (!isStarted) {
          // First time starting: add animation classes
          block.classList.add("animate-block");
          spring.classList.add("animate-spring");
          keBar.classList.add("animate-ke");
          peBar.classList.add("animate-pe");
          isStarted = true;
        }

        if (!isPlaying) {
          // Resume Animation
          block.classList.remove("paused");
          spring.classList.remove("paused");
          keBar.classList.remove("paused");
          peBar.classList.remove("paused");

          playPauseBtn.textContent = "Pause";
          playPauseBtn.classList.add("playing");
          isPlaying = true;
        } else {
          // Pause Animation
          block.classList.add("paused");
          spring.classList.add("paused");
          keBar.classList.add("paused");
          peBar.classList.add("paused");

          playPauseBtn.textContent = "Resume";
          playPauseBtn.classList.remove("playing");
          isPlaying = false;
        }
      });

      // Reset Functionality
      resetBtn.addEventListener("click", () => {
        // Remove all animation and pause classes to force reset
        block.className = "block";
        spring.className = "spring";
        keBar.className = "bar-inner ke-inner";
        peBar.className = "bar-inner pe-inner";

        // Reset states
        isPlaying = false;
        isStarted = false;
        playPauseBtn.textContent = "Start";
        playPauseBtn.classList.remove("playing");
      });
    </script>
  </body>
</html>
